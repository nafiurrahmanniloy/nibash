# supabase/config.toml — minimal local config for the Travela Stay Platform.
# Drives `supabase start` (local Postgres + Auth + Storage + Realtime) and
# `supabase db reset` (runs migrations/ in lexical order, then seed/seed.sql).
# Production project settings live in the Supabase dashboard, not here.

# Project ref used by the local CLI. Change to your real ref when linking.
project_id = "travela-stay"

[api]
enabled = true
# Schemas exposed over the auto-generated REST/GraphQL API.
schemas = ["public"]
# Schemas searched when resolving unqualified names in API requests.
extra_search_path = ["public", "extensions"]
# Max rows a single REST request may return.
max_rows = 1000

[db]
# Local Postgres port. Must be free on the host.
port = 54322
# Shadow DB port used for diffing/generating migrations.
shadow_port = 54320
# Must match the Postgres major version of your hosted project.
major_version = 15

[db.seed]
# Run supabase/seed/seed.sql after migrations on `db reset`.
enabled = true
sql_paths = ["./seed/seed.sql"]

[studio]
enabled = true
port = 54323

[realtime]
# Powers live messaging (Phase 4) and host request updates.
enabled = true

[storage]
enabled = true
# Listing photos are large; allow generous per-file size.
file_size_limit = "50MiB"

[auth]
enabled = true
# Canonical site URL — overridden per-env via SUPABASE_AUTH_SITE_URL.
site_url = "env(NEXT_PUBLIC_SITE_URL)"
# Allowed redirect targets for OAuth + magic links (local + prod).
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# v1 supports email + Google (BUILD-PLAN §0 / Phase 0).
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = "env(SUPABASE_AUTH_GOOGLE_REDIRECT_URI)"

[inbucket]
# Local email testing inbox.
enabled = true
port = 54324
